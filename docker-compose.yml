# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  RAG MCP Server — Docker Compose 编排                                    ║
# ║                                                                         ║
# ║  服务拓扑:                                                               ║
# ║    mcp-rag-server ──→ redis-stack (向量存储/缓存/任务队列)               ║
# ║                   ──→ neo4j       (知识图谱, 可选)                       ║
# ║                                                                         ║
# ║  启动命令:                                                               ║
# ║    全部启动:   docker compose up -d                                      ║
# ║    不含 Neo4j: docker compose up -d mcp-rag-server redis-stack           ║
# ║    仅基础设施: docker compose up -d redis-stack neo4j                    ║
# ║                                                                         ║
# ║  环境变量 (.env 文件或 shell export):                                    ║
# ║    详见 .env.example — 每个功能模块独立配置 base_url / api_key / model    ║
# ║    REDIS_PASSWORD              — Redis 密码                               ║
# ║    EMBEDDING_PRIMARY_API_KEY   — 主 Embedding 服务 API Key (必须)         ║
# ║    RERANK_API_KEY              — Rerank 重排序 API Key                    ║
# ║    GRAPH_NEO4J_PASSWORD        — Neo4j 密码 (默认 neo4j_rag_2024)        ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

services:

  # ═════════════════════════════════════════════════════════════════════════
  #  RAG MCP Server — 核心应用
  # ═════════════════════════════════════════════════════════════════════════
  mcp-rag-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-rag-server
    restart: unless-stopped
    ports:
      - "8083:8083"             # 统一单端口: MCP (/mcp) + Health (/health) + Metrics (/metrics)
    environment:
      # ---- Embedding Provider (主) ----
      - EMBEDDING_PRIMARY_BASE_URL=${EMBEDDING_PRIMARY_BASE_URL:-}
      - EMBEDDING_PRIMARY_API_KEY=${EMBEDDING_PRIMARY_API_KEY:-}
      - EMBEDDING_PRIMARY_MODEL=${EMBEDDING_PRIMARY_MODEL:-text-embedding-v4}
      # ---- Embedding Provider (备) ----
      - EMBEDDING_FALLBACK_BASE_URL=${EMBEDDING_FALLBACK_BASE_URL:-}
      - EMBEDDING_FALLBACK_API_KEY=${EMBEDDING_FALLBACK_API_KEY:-}
      - EMBEDDING_FALLBACK_MODEL=${EMBEDDING_FALLBACK_MODEL:-text-embedding-3-small}
      # ---- Rerank 重排序 ----
      - RERANK_BASE_URL=${RERANK_BASE_URL:-}
      - RERANK_API_KEY=${RERANK_API_KEY:-}
      - RERANK_MODEL=${RERANK_MODEL:-qwen3-rerank}
      # ---- HyDE 查询扩展 ----
      - HYDE_BASE_URL=${HYDE_BASE_URL:-}
      - HYDE_API_KEY=${HYDE_API_KEY:-}
      - HYDE_MODEL=${HYDE_MODEL:-qwen-turbo}
      # ---- Multi-Query 多查询检索 ----
      - MULTI_QUERY_BASE_URL=${MULTI_QUERY_BASE_URL:-}
      - MULTI_QUERY_API_KEY=${MULTI_QUERY_API_KEY:-}
      - MULTI_QUERY_MODEL=${MULTI_QUERY_MODEL:-qwen-turbo}
      # ---- Context Compressor 上下文压缩 ----
      - COMPRESSOR_BASE_URL=${COMPRESSOR_BASE_URL:-}
      - COMPRESSOR_API_KEY=${COMPRESSOR_API_KEY:-}
      - COMPRESSOR_MODEL=${COMPRESSOR_MODEL:-qwen-turbo}
      # ---- Graph RAG ----
      - GRAPH_NEO4J_PASSWORD=${GRAPH_NEO4J_PASSWORD:-neo4j_rag_2024}
      - GRAPH_LLM_BASE_URL=${GRAPH_LLM_BASE_URL:-}
      - GRAPH_LLM_API_KEY=${GRAPH_LLM_API_KEY:-}
      - GRAPH_LLM_MODEL=${GRAPH_LLM_MODEL:-qwen-turbo}
      # ---- VectorStore (可选) ----
      - MILVUS_TOKEN=${MILVUS_TOKEN:-}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      # ---- 基础设施密码 ----
      - REDIS_PASSWORD=${REDIS_PASSWORD:-123456}
    volumes:
      - ./config.toml:/app/config.toml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      redis-stack:
        condition: service_healthy
      # Neo4j 依赖条件启动: 仅当 graph_rag.enabled=true 且 graph_store_type="neo4j" 时需要
      # 如果不使用 Neo4j，可注释下面两行或使用 --no-deps 启动
      neo4j:
        condition: service_healthy
      # Milvus 依赖: 向量数据库后端
      milvus:
        condition: service_healthy
    networks:
      - rag-network

  # ═════════════════════════════════════════════════════════════════════════
  #  Redis Stack — 向量数据库 + 缓存 + 任务队列
  #  包含 RediSearch (FT.CREATE/FT.SEARCH) 和 RedisJSON 模块
  # ═════════════════════════════════════════════════════════════════════════
  redis-stack:
    image: redis/redis-stack:latest
    container_name: redis-stack
    restart: unless-stopped
    ports:
      - "6380:6379"             # Redis 端口 (宿主机 6380 避免冲突)
      - "8002:8001"             # RedisInsight 管理面板
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD:-123456}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rag-network

  # ═════════════════════════════════════════════════════════════════════════
  #  Neo4j — 知识图谱数据库 (Graph RAG 后端)
  #
  #  用途: 存储从文档中提取的实体-关系三元组，支持多跳图谱检索
  #  协议: Bolt (bolt://neo4j:7687) + HTTP (http://neo4j:7474)
  #
  #  首次启动会自动:
  #    1. 设置密码为 GRAPH_NEO4J_PASSWORD 环境变量值
  #    2. 接受社区版 License
  #    3. 启用 APOC 插件 (高级过程和函数库)
  #
  #  管理面板: http://localhost:7474 (用户名 neo4j)
  #
  #  如不需要 Graph RAG 功能，可将 config.toml 中
  #  graph_rag.enabled 设为 false，并注释掉此服务
  # ═════════════════════════════════════════════════════════════════════════
  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"             # HTTP API + Neo4j Browser 管理面板
      - "7687:7687"             # Bolt 协议 (应用连接端口)
    environment:
      # ---- 认证配置 ----
      - NEO4J_AUTH=neo4j/${GRAPH_NEO4J_PASSWORD:-neo4j_rag_2024}
      # ---- 内存配置 (按服务器资源调整) ----
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=256m
      # ---- 插件 ----
      - NEO4J_PLUGINS=["apoc"]
      # ---- 接受社区版 License ----
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - neo4j_data:/data          # 数据持久化
      - neo4j_logs:/logs          # 日志
    healthcheck:
      # 通过 Cypher 命令验证 Bolt 端口和数据库引擎完全就绪
      # 之前仅检测 HTTP 7474，但 Bolt 7687 可能还未就绪，导致 mcp-rag-server 连接 refused
      test: ["CMD-SHELL", "echo 'RETURN 1;' | cypher-shell -u neo4j -p ${GRAPH_NEO4J_PASSWORD:-neo4j_rag_2024} -a bolt://localhost:7687 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 45s           # Neo4j 冷启动需 30-60s，给足初始化时间
    networks:
      - rag-network

  # ═════════════════════════════════════════════════════════════════════════
  #  Milvus — 向量数据库 (VectorStore 后端)
  #
  #  架构: etcd (元数据) + MinIO (对象存储) + Milvus (向量引擎)
  #  API:  RESTful http://milvus:19530/v2/vectordb/...
  #  管理: Attu http://localhost:8000 (可选)
  #
  #  适用场景: 百万级以上向量，需要高性能 ANN 搜索
  #  如不使用 Milvus，将 config.toml 中 vector_store.type 改为 "redis"
  #  并注释掉以下 3 个服务
  # ═════════════════════════════════════════════════════════════════════════

  # Milvus 元数据存储
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: milvus-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296       # 4GB
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - rag-network

  # Milvus 对象存储 (向量数据 + 索引文件)
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: milvus-minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9010:9000"             # MinIO API (宿主机 9010 避免冲突)
      - "9011:9001"             # MinIO Console
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - rag-network

  # Milvus 向量数据库 (Standalone 模式)
  milvus:
    image: milvusdb/milvus:v2.5.6
    container_name: milvus
    restart: unless-stopped
    command: ["/milvus/bin/milvus", "run", "standalone"]   # 完整路径，镜像 Cmd=[] 需显式指定
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    ports:
      - "19530:19530"           # Milvus gRPC + REST API
      - "9099:9091"             # Milvus Metrics (宿主机 9099 避免冲突)
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s         # Milvus 冷启动较慢
    networks:
      - rag-network

  # ── Prometheus (指标采集) ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    depends_on:
      mcp-rag-server:
        condition: service_healthy
    networks:
      - rag-network

  # ── Grafana (指标可视化) ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - rag-network

volumes:
  redis_data:
    name: mcp_rag_redis_data
  neo4j_data:
    name: mcp_rag_neo4j_data
  neo4j_logs:
    name: mcp_rag_neo4j_logs
  etcd_data:
    name: mcp_rag_etcd_data
  minio_data:
    name: mcp_rag_minio_data
  milvus_data:
    name: mcp_rag_milvus_data
  prometheus_data:
    name: mcp_rag_prometheus_data
  grafana_data:
    name: mcp_rag_grafana_data

networks:
  rag-network:
    name: mcp_rag_network
