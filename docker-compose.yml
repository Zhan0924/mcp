version: '3.8'

services:
  mcp-rag-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-rag-server
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      # 传入环境变量覆盖 API Key 等敏感配置 (根据 config.toml 中定义的 ${VAR_NAME} 替换逻辑)
      - REDIS_PASSWORD=${REDIS_PASSWORD:-123456}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
    volumes:
      - ./config.toml:/app/config.toml
    depends_on:
      - redis-stack
    networks:
      - rag-network

  redis-stack:
    image: redis/redis-stack:latest
    container_name: redis-stack
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8001:8001" # RedisInsight 面板端口
    environment:
      # 配置 redis 密码
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD:-123456}
    volumes:
      - redis_data:/data
    networks:
      - rag-network

volumes:
  redis_data:
    name: mcp_rag_redis_data

networks:
  rag-network:
    name: mcp_rag_network
