# ──────────────────────────────────────────────────────────────────────────────
#  docker-compose.prod.yml — RAG MCP Server 生产级部署
#
#  与 docker-compose.yml（开发环境）的区别：
#    1. 资源限制：CPU/内存 limits + reservations
#    2. 重启策略：on-failure + max_attempts
#    3. Redis：启用 AOF 持久化 + maxmemory + requirepass
#    4. Neo4j：调优 heap/pagecache 内存
#    5. 日志：限制大小 + 轮转
#    6. 安全：read_only + tmpfs + no-new-privileges
#
#  使用方式：
#    docker compose -f docker-compose.prod.yml up -d
#    docker compose -f docker-compose.prod.yml logs -f mcp-rag-server
# ──────────────────────────────────────────────────────────────────────────────
version: "3.8"

services:
  # ── RAG MCP Server ────────────────────────────────────────────────────────
  mcp-rag-server:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-rag-mcp-server}:${VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-rag-server
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
    ports:
      - "${MCP_PORT:-8083}:8083"       # 统一单端口: MCP + Health + Metrics
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ${TLS_CERT_DIR:-./certs}:/app/tls:ro
      - upload_data:/app/uploads
    environment:
      # Embedding Providers
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-v4}
      - FALLBACK_EMBEDDING_API_KEY=${FALLBACK_EMBEDDING_API_KEY:-}
      - FALLBACK_EMBEDDING_BASE_URL=${FALLBACK_EMBEDDING_BASE_URL:-}
      # Rerank
      - RERANK_API_KEY=${RERANK_API_KEY:-}
      - RERANK_BASE_URL=${RERANK_BASE_URL:-}
      # Redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      # Neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      # TLS
      - TLS_ENABLED=${TLS_ENABLED:-false}
    depends_on:
      redis-stack:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100M
    networks:
      - rag-network

  # ── Redis Stack (VectorDB + Cache + TaskQueue) ───────────────────────────
  redis-stack:
    image: redis/redis-stack-server:7.4.0-v3
    container_name: redis-stack
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 60
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 6G
        reservations:
          cpus: "0.5"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - rag-network

  # ── Neo4j (Knowledge Graph) ──────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    restart: always
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3G
        reservations:
          cpus: "0.5"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - rag-network

volumes:
  redis_data:
    name: rag_prod_redis_data
  neo4j_data:
    name: rag_prod_neo4j_data
  neo4j_logs:
    name: rag_prod_neo4j_logs
  upload_data:
    name: rag_prod_upload_data

networks:
  rag-network:
    name: rag-prod-network
    driver: bridge
