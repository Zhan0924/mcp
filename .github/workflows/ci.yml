name: RAG MCP Server CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.24'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/rag-mcp-server

jobs:
  # ── 代码质量检查 ──────────────────────────────────────────────
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Go Vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ── 单元测试 + 覆盖率 ────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis/redis-stack-server:7.4.0-v3
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run Tests
        env:
          REDIS_ADDR: localhost:6379
        run: |
          go test ./... -race -coverprofile=coverage.out -covermode=atomic -v -timeout=5m
      - name: Coverage Report
        run: go tool cover -func=coverage.out | tail -1
      - name: Upload Coverage
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out
          fail_ci_if_error: false

  # ── 安全扫描 ─────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Go Security Check (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: Build Docker Image for Scan
        run: docker build -t ${{ env.IMAGE_NAME }}:scan .
      - name: Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

  # ── Docker 构建与推送 ────────────────────────────────────────
  build:
    name: Build & Push
    needs: [lint, test, security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 端到端测试 ───────────────────────────────────────────────
  e2e:
    name: E2E Test
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Start Services
        run: |
          docker compose up -d
          sleep 15
      - name: Health Check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://localhost:8083/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: HTTP $STATUS"
            docker compose logs
            exit 1
          fi
          echo "Health check passed: HTTP $STATUS"
      - name: Metrics Check
        run: curl -s http://localhost:8083/metrics | python3 -m json.tool
      - name: Traces Check
        run: curl -s http://localhost:8083/traces | python3 -m json.tool
      - name: Cleanup
        if: always()
        run: docker compose down -v
